    <!-- LEFT: Info -->
    <div class="space-y-6">

      <div class="bg-white/10 p-5 rounded-xl flex items-center space-x-4 hover:bg-white/20 transition">
        <i class="fa-solid fa-location-dot text-pink-500 text-xl"></i>
        <div>
          <h2 class="font-semibold">Address</h2>

      <div class="bg-white/10 p-5 rounded-xl flex items-center space-x-4 hover:bg-white/20 transition">
        <i class="fa-solid fa-phone text-green-400 text-xl"></i>
        <div>
          <h2 class="font-semibold">Telefoon</h2>
          <p class="text-gray-300">+252 61 1234567</p>
        </div>
      </div>

      <div class="bg-white/10 p-5 rounded-xl flex items-center space-x-4 hover:bg-white/20 transition">
        <i class="fa-solid fa-envelope text-blue-400 text-xl"></i>
        <div>
          <h2 class="font-semibold">Email</h2>
          <p class="text-gray-300">info@shop.com</p>
        </div>
      </div>

      <!-- Map -->
      <div class="rounded-xl overflow-hidden shadow-lg">
        <iframe 
          src="https://www.google.com/maps?q=Mogadishu&output=embed"
          class="w-full h-60 border-0">
        </iframe> 
      </div>

    </div>

    <!-- RIGHT: Form -->
    <div class="bg-white/10 backdrop-blur p-6 rounded-xl shadow-lg">

      <h2 class="text-2xl font-bold mb-5 text-center">Fariin Dir</h2>

      <form class="space-y-4">

        <input type="email" placeholder="Email-kaaga"
          class="w-full p-3 rounded-lg bg-transparent border border-gray-500 focus:ring-2 focus:ring-blue-500 outline-none">

        <textarea placeholder="Fariintaada..."
          class="w-full p-3 rounded-lg bg-transparent border border-gray-500 h-32 focus:ring-2 focus:ring-purple-500 outline-none"></textarea>

        <button class="w-full py-3 rounded-lg bg-gradient-to-r from-pink-500 to-purple-600 font-semibold hover:scale-105 transition">
          🚀 Dir Fariin
        </button>
